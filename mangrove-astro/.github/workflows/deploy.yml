name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mangrove-astro/package-lock.json

      - name: Install dependencies
        run: cd mangrove-astro && npm ci

      - name: Build
        run: cd mangrove-astro && npm run build

      - name: Configure Git
        run: |
          git config --global user.email "walter@freshsite.studio"
          git config --global user.name "Walter"
          git config --global --bool push.autoSetupRemote true

      - name: Publish to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: mangrove-astro/dist
          clean: true
          clean-exclude: |
            .nojekyll
